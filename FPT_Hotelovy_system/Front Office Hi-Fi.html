<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8"/>
<title>Front Office — Hi-Fi · Kúpele Bardejov</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="hifi.css"/>
<style>
  body{ font-family:'Inter',sans-serif; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="hifi-shared.jsx"></script>
<script type="text/babel" src="hifi-cover.jsx"></script>
<script type="text/babel" src="hifi-flow.jsx"></script>
<script type="text/babel" src="hifi-dashboard.jsx"></script>
<script type="text/babel" src="hifi-grid.jsx"></script>
<script type="text/babel" src="hifi-newres.jsx"></script>
<script type="text/babel" src="hifi-checkin.jsx"></script>
<script type="text/babel" src="hifi-checkout.jsx"></script>
<script type="text/babel" src="hifi-guest.jsx"></script>
<script type="text/babel" src="hifi-proc.jsx"></script>
<script type="text/babel" src="hifi-palette.jsx"></script>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "lang": "sk",
  "accent": "blue"
}/*EDITMODE-END*/;

function TweaksUI(){
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  React.useEffect(()=>{
    window.HF_LANG = t.lang;
    document.documentElement.style.setProperty('--blue', t.accent==='cyan' ? '#1FB7D4' : t.accent==='plum' ? '#7857C7' : '#2E5BFF');
    window.dispatchEvent(new CustomEvent('hf-tweaks',{detail:t}));
  }, [t.lang, t.accent]);
  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Jazyk · Language">
        <TweakRadio label="Jazyk" value={t.lang} onChange={v=>setTweak('lang',v)}
          options={[{value:'sk',label:'SK'},{value:'en',label:'EN'}]}/>
      </TweakSection>
      <TweakSection label="Akcentová farba">
        <TweakRadio label="Akcent" value={t.accent} onChange={v=>setTweak('accent',v)}
          options={[{value:'blue',label:'Blue'},{value:'cyan',label:'Cyan'},{value:'plum',label:'Plum'}]}/>
      </TweakSection>
    </TweaksPanel>
  );
}

function App(){
  const [bump, setBump] = React.useState(0);
  React.useEffect(()=>{
    const f = ()=> setBump(b=>b+1);
    window.addEventListener('hf-tweaks', f);
    return ()=> window.removeEventListener('hf-tweaks', f);
  }, []);
  return (
    <>
      <TweaksUI/>
      <DesignCanvas key={bump}>
        <DCSection id="cover" title="Front Office · Kúpele Bardejov" subtitle="Hi-fi v1 · FPT Digital brand · 1 user flow + 8 obrazoviek">
          <DCArtboard id="cover" label="00 · Cover" width={1280} height={760}><HFCover/></DCArtboard>
        </DCSection>

        <DCSection id="flow" title="01 · User flow diagram" subtitle="Kompletná mapa workflow recepčného · swimlane">
          <DCArtboard id="flow" label="User flow · 21 krokov · 3 vrstvy" width={2800} height={1500}><HFFlow/></DCArtboard>
        </DCSection>

        <DCSection id="screens" title="02 · Finálny dizajn — kľúčové obrazovky" subtitle="8 hi-fi mockupov pripravených na implementáciu">
          <DCArtboard id="dash"   label="Dashboard · Timeline dňa"        width={1440} height={900}><HFDashboard/></DCArtboard>
          <DCArtboard id="grid"   label="Rezervačná mriežka"               width={1440} height={900}><HFGrid/></DCArtboard>
          <DCArtboard id="newres" label="Nová rezervácia · Quick"          width={1440} height={900}><HFNewRes/></DCArtboard>
          <DCArtboard id="ci"     label="Check-in · one-screen"            width={1440} height={900}><HFCheckin/></DCArtboard>
          <DCArtboard id="co"     label="Check-out + Kasa"                 width={1440} height={900}><HFCheckout/></DCArtboard>
          <DCArtboard id="guest"  label="Detail hosťa / pacienta"          width={1440} height={900}><HFGuest/></DCArtboard>
          <DCArtboard id="proc"   label="Procedúry · väzba na M5"          width={1440} height={900}><HFProc/></DCArtboard>
          <DCArtboard id="palette" label="⌘K Command palette"              width={1440} height={900}><HFPalette/></DCArtboard>
        </DCSection>
      </DesignCanvas>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
