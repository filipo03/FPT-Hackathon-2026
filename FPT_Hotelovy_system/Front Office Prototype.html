<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8"/>
<title>Front Office · Hotelový systém — Interaktívny prototyp</title>
<meta name="viewport" content="width=1440, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="hifi.css"/>
<style>
  html, body{ margin:0; padding:0; height:100%; background:#0A1126; font-family:'Inter',sans-serif; overflow:hidden; }
  #stage{
    position:relative; width:100vw; height:100vh;
    background:var(--bg);
    transition: background .25s;
  }
  #stage.dark{ background:#0E1226; }
  #screen-host{
    position:absolute; inset:0;
    transform-origin: top left;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes toastIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes paletteIn { from{opacity:0;transform:scale(.95) translateY(-10px)} to{opacity:1;transform:scale(1) translateY(0)} }
  @keyframes screenIn { from{opacity:0} to{opacity:1} }
  .screen-frame{ animation: screenIn 200ms ease; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail" data-bg-color="#0F1F4D">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="200" fill="#0F1F4D"/>
    <circle cx="140" cy="60" r="60" fill="none" stroke="#5DD3E8" stroke-width="14" opacity="0.6"/>
    <circle cx="60" cy="140" r="42" fill="none" stroke="#2E5BFF" stroke-width="10" opacity="0.7"/>
    <rect x="40" y="86" width="120" height="38" rx="8" fill="#fff"/>
    <text x="100" y="113" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="22" fill="#0F1F4D" letter-spacing="-0.5">H&amp;S · FO</text>
  </svg>
</template>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="hifi-shared.jsx"></script>
<script type="text/babel" src="hifi-dashboard.jsx"></script>
<script type="text/babel" src="hifi-grid.jsx"></script>
<script type="text/babel" src="hifi-newres.jsx"></script>
<script type="text/babel" src="hifi-checkin.jsx"></script>
<script type="text/babel" src="hifi-checkout.jsx"></script>
<script type="text/babel" src="hifi-guest.jsx"></script>
<script type="text/babel" src="hifi-guests-list.jsx"></script>
<script type="text/babel" src="hifi-house.jsx"></script>
<script type="text/babel" src="hifi-proc.jsx"></script>
<script type="text/babel" src="proto-app.jsx"></script>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "lang": "sk",
  "accent": "blue",
  "dark": false,
  "sidebarCollapsed": false
}/*EDITMODE-END*/;

function TweaksUI(){
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  React.useEffect(()=>{
    window.HF_LANG = t.lang;
    document.documentElement.style.setProperty('--blue', t.accent==='cyan' ? '#1FB7D4' : t.accent==='plum' ? '#7857C7' : '#2E5BFF');
    window.dispatchEvent(new CustomEvent('hf-tweaks',{detail:t}));
  }, [t.lang, t.accent]);
  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Jazyk · Language">
        <TweakRadio label="Jazyk" value={t.lang} onChange={v=>setTweak('lang',v)}
          options={[{value:'sk',label:'SK'},{value:'en',label:'EN'}]}/>
      </TweakSection>
      <TweakSection label="Akcent">
        <TweakRadio label="Akcent" value={t.accent} onChange={v=>setTweak('accent',v)}
          options={[{value:'blue',label:'Blue'},{value:'cyan',label:'Cyan'},{value:'plum',label:'Plum'}]}/>
      </TweakSection>
    </TweaksPanel>
  );
}

// Scale 1440-wide design to fit viewport (responsive on resize)
function useScale(){
  const [s, setS] = React.useState(1);
  const [vp, setVp] = React.useState({w: typeof window !== 'undefined' ? window.innerWidth : 1440, h: typeof window !== 'undefined' ? window.innerHeight : 900});
  React.useEffect(()=>{
    const compute = () => {
      const W = window.innerWidth, H = window.innerHeight;
      const sx = W/1440, sy = H/900;
      const sc = Math.min(sx, sy, 1);
      setS(sc);
      setVp({w: W, h: H});
    };
    compute();
    window.addEventListener('resize', compute);
    return () => window.removeEventListener('resize', compute);
  }, []);
  return { scale: s, vp };
}

function App(){
  const [screen, setScreen] = React.useState('dash');
  const [palette, setPalette] = React.useState(false);
  const [toasts, setToasts] = React.useState([]);
  const [bump, setBump] = React.useState(0);
  const [dark, setDark] = React.useState(()=> { try { return localStorage.getItem('hf-dark')==='1'; } catch(e) { return false; } });
  const [sidebarCollapsed, setSidebarCollapsed] = React.useState(()=> { try { return localStorage.getItem('hf-sb')==='1'; } catch(e) { return false; } });

  React.useEffect(()=>{ try { localStorage.setItem('hf-dark', dark?'1':'0'); } catch(e){} }, [dark]);
  React.useEffect(()=>{ try { localStorage.setItem('hf-sb', sidebarCollapsed?'1':'0'); } catch(e){} }, [sidebarCollapsed]);

  React.useEffect(()=>{
    const f = ()=> setBump(b=>b+1);
    window.addEventListener('hf-tweaks', f);
    return ()=> window.removeEventListener('hf-tweaks', f);
  }, []);

  const toastFn = React.useCallback((msg) => {
    const id = Math.random().toString(36).slice(2);
    setToasts(t=>[...t,{id,msg}]);
    setTimeout(()=> setToasts(t=>t.filter(x=>x.id!==id)), 3800);
  }, []);

  const navValue = React.useMemo(()=>({
    current: screen,
    go: (s) => setScreen(s),
    openPalette: () => setPalette(true),
    toast: toastFn,
    dark,
    toggleDark: () => setDark(d => !d),
    sidebarCollapsed,
    toggleSidebar: () => setSidebarCollapsed(c => !c),
  }), [screen, toastFn, dark, sidebarCollapsed]);

  // Keyboard: only Ctrl/Cmd+K opens search; Esc closes palette.
  // (No Ctrl+N — collides with Chrome new-window shortcut.)
  React.useEffect(()=>{
    const onKey = (e) => {
      if((e.metaKey || e.ctrlKey) && e.key.toLowerCase()==='k'){ e.preventDefault(); setPalette(true); }
      else if(e.key==='Escape'){ setPalette(false); }
    };
    window.addEventListener('keydown', onKey);
    return ()=> window.removeEventListener('keydown', onKey);
  }, []);

  // Render screen
  let body;
  switch(screen){
    case 'dash':     body = <HFDashboard/>; break;
    case 'grid':     body = <HFGrid/>; break;
    case 'newres':   body = <HFNewRes/>; break;
    case 'checkin':  body = <HFCheckin/>; break;
    case 'checkout': body = <HFCheckout/>; break;
    case 'guest':    body = <HFGuest/>; break;
    case 'proc':     body = <HFProc/>; break;
    case 'house':    body = <HFHouse/>; break;
    case 'guests':   body = <HFGuestsList/>; break;
    case 'cash':     body = <StubScreen title="Kasa & faktúry" sub="Otvorené účty · platby · depozity" ic="cash"/>; break;
    case 'rep':      body = <StubScreen title="Reporty" sub="Obsadenosť, no-show, tržby zmeny" ic="report"/>; break;
    case 'tasks':    body = <StubScreen title="Úlohy & denník zmien" sub="Tasky, audit log, odovzdanie" ic="tasks"/>; break;
    default:         body = <HFDashboard/>;
  }

  const { scale, vp } = useScale();

  return (
    <NavCtx.Provider value={navValue}>
      <TweaksUI/>
      <div id="stage" className={dark?'dark':''} key={bump}>
        <div id="screen-host" className="screen-frame" key={screen} style={{
          width: 1440, height: 900,
          transform: `scale(${scale}) translate(${(vp.w - 1440*scale)/(2*scale)}px, ${(vp.h - 900*scale)/(2*scale)}px)`,
        }}>
          {body}
        </div>
      </div>

      {palette && <PaletteOverlay onClose={()=>setPalette(false)} onPick={(item)=>{
        setPalette(false);
        setScreen(item.go);
      }}/>}

      <ToastStack toasts={toasts} onClear={(id)=>setToasts(t=>t.filter(x=>x.id!==id))}/>

      <MessengerOverlay dark={dark}/>
    </NavCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
